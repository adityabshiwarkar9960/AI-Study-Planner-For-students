<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — AI Study Planner</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body class="auth-body">

  <!-- Dark-mode toggle -->
  <div class="position-fixed top-0 end-0 p-3" style="z-index:999">
    <div class="form-check form-switch mb-0">
      <input class="form-check-input" type="checkbox" id="darkToggle" role="switch" />
      <label class="form-check-label text-muted" for="darkToggle">
        <i class="fas fa-moon"></i>
      </label>
    </div>
  </div>

  <div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100">
    <div class="auth-card card shadow-lg border-0" style="width:440px;max-width:95vw">
      <div class="card-body p-5">

        <!-- Brand -->
        <div class="text-center mb-4">
          <div class="auth-brand-icon mb-3">
            <i class="fas fa-user-graduate fa-3x text-success"></i>
          </div>
          <h3 class="fw-bold">Create Account</h3>
          <p class="text-muted small">Join thousands of productive students</p>
        </div>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for cat, msg in messages %}
              <div class="alert alert-{{ cat }} alert-dismissible fade show py-2" role="alert">
                {{ msg }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- Signup form -->
        <form method="POST" novalidate>
          <div class="mb-3">
            <label for="name" class="form-label fw-semibold">Full name</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
              <input type="text" class="form-control" id="name" name="name"
                     placeholder="Your name" required autocomplete="name" />
            </div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
              <input type="email" class="form-control" id="email" name="email"
                     placeholder="you@example.com" required autocomplete="email" />
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="Min 6 characters" required minlength="6"
                     autocomplete="new-password" />
              <button class="btn btn-outline-secondary" type="button" id="togglePwd"
                      tabindex="-1">
                <i class="fas fa-eye" id="eyeIcon"></i>
              </button>
            </div>
            <div class="form-text">At least 6 characters.</div>
          </div>

          <!-- Password strength bar -->
          <div class="mb-3">
            <div class="progress" style="height:5px">
              <div class="progress-bar" id="strengthBar" role="progressbar"
                   style="width:0%" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <div class="form-text" id="strengthText"></div>
          </div>

          <button type="submit" class="btn btn-success w-100 fw-semibold py-2">
            <i class="fas fa-user-plus me-2"></i>Create Account
          </button>
        </form>

        <hr class="my-4" />
        <p class="text-center mb-0 small">
          Already have an account?
          <a href="{{ url_for('login') }}" class="fw-bold">Login</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script>
    // Password visibility
    document.getElementById('togglePwd').addEventListener('click', () => {
      const pwd  = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
      icon.classList.toggle('fa-eye');
      icon.classList.toggle('fa-eye-slash');
    });

    // Strength meter
    document.getElementById('password').addEventListener('input', function () {
      const val = this.value;
      const bar = document.getElementById('strengthBar');
      const txt = document.getElementById('strengthText');
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { pct: 0,   cls: '',              lbl: '' },
        { pct: 20,  cls: 'bg-danger',     lbl: 'Very weak' },
        { pct: 40,  cls: 'bg-warning',    lbl: 'Weak' },
        { pct: 60,  cls: 'bg-info',       lbl: 'Fair' },
        { pct: 80,  cls: 'bg-primary',    lbl: 'Strong' },
        { pct: 100, cls: 'bg-success',    lbl: 'Very strong' },
      ];
      const l = levels[score];
      bar.style.width    = l.pct + '%';
      bar.className      = 'progress-bar ' + l.cls;
      txt.textContent    = l.lbl;
    });
  </script>
</body>
</html>
