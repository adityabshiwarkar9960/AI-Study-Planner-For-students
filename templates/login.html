<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — AI Study Planner</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body class="auth-body">

  <div class="position-fixed top-0 start-0 p-3" style="z-index:999">
    <a href="{{ url_for('index') }}" class="btn btn-sm btn-light shadow-sm">
      <i class="fas fa-arrow-left me-2"></i>Home
    </a>
  </div>

  <!-- Dark-mode toggle (top-right) -->
  <div class="position-fixed top-0 end-0 p-3" style="z-index:999">
    <div class="form-check form-switch mb-0">
      <input class="form-check-input" type="checkbox" id="darkToggle" role="switch" />
      <label class="form-check-label text-muted" for="darkToggle">
        <i class="fas fa-moon"></i>
      </label>
    </div>
  </div>

  <div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100">
    <div class="auth-card card shadow-lg border-0" style="width:420px;max-width:95vw">
      <div class="card-body p-5">

        <!-- Brand -->
        <div class="text-center mb-4">
          <div class="auth-brand-icon mb-3">
            <i class="fas fa-graduation-cap fa-3x text-primary"></i>
          </div>
          <h3 class="fw-bold">AI Study Planner</h3>
          <p class="text-muted small">Your AI-powered productivity coach</p>
        </div>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for cat, msg in messages %}
              <div class="alert alert-{{ cat }} alert-dismissible fade show py-2" role="alert">
                {{ msg }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- Login form -->
        <form method="POST" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
              <input type="email" class="form-control" id="email" name="email"
                     placeholder="you@example.com" required autocomplete="email" />
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="Enter password" required autocomplete="current-password" />
              <button class="btn btn-outline-secondary" type="button" id="togglePwd"
                      tabindex="-1" title="Show/hide password">
                <i class="fas fa-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
            <i class="fas fa-sign-in-alt me-2"></i>Login
          </button>
       <div class="mb-3 text-end small">
        <div class="mb-3 text-end small">
          <a href="{{ url_for('forgot') }}">Forgot password?</a>
        </div>
        </form>

        <hr class="my-4" />
        <p class="text-center mb-0 small">
          Don't have an account?
          <a href="{{ url_for('signup') }}" class="fw-bold">Create one</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script>
    // Password visibility toggle
    document.getElementById('togglePwd').addEventListener('click', () => {
      const pwd  = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pwd.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });
  </script>
</body>
</html>
