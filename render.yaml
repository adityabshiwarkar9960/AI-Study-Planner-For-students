services:
  - type: web
    name: ai-student-planner
    env: python
    plan: free
    buildCommand: python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /tmp/ai_student_planner.db
      - key: UPLOAD_FOLDER
        value: /tmp/uploads/avatars